<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #06070d; color: white; } .page-content { display: none; } .page-content.active { display: block; }</style>
</head>
<body>

    <main class="flex min-h-screen">
        <!-- القائمة الجانبية -->
        <aside class="w-64 border-l border-slate-800 p-6">
            <h2 class="text-red-500 font-black mb-6">قائمة التحكم LSFD</h2>
            <nav class="space-y-2">
                <button onclick="switchPage('page-main', this)" class="nav-btn w-full text-right p-3 bg-slate-900 rounded-lg">الرئيسية</button>
                <button onclick="switchPage('page-data', this)" class="nav-btn w-full text-right p-3 hover:bg-slate-800 rounded-lg">قاعدة البيانات</button>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي -->
        <div class="flex-1 p-8">
            <!-- صفحة الرئيسية -->
            <div id="page-main" class="page-content active">
                <h1 class="text-2xl font-bold">مرحباً بك في نظام LSFD</h1>
                <p class="text-slate-400 mt-4">استخدم القائمة الجانبية للتنقل.</p>
            </div>

            <!-- صفحة الجدول (المضافة حديثاً) -->
            <div id="page-data" class="page-content">
                <h2 class="text-xl font-bold mb-4">قاعدة البيانات</h2>
                <div class="w-full h-[600px] bg-white rounded-xl overflow-hidden">
                    <iframe 
                        src="https://docs.google.com/spreadsheets/d/1Nf0Gc2nkUTuug4YLwuAQpkj9OVjTZH9dbRMqAsuZ6GA/pubhtml?widget=true&amp;headers=false" 
                        class="w-full h-full border-none">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

    <script>
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
