<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; background-color: #06070d; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-[#0b0c16] p-8 rounded-2xl border border-slate-800 w-96 text-center">
        <h2 class="text-2xl font-black mb-6 text-red-500">دخول قيادة LSFD</h2>
        <input type="text" id="username" placeholder="اسم المستخدم" class="w-full p-3 mb-3 bg-slate-900 rounded-lg text-white text-center">
        <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 mb-4 bg-slate-900 rounded-lg text-white text-center">
        <button onclick="login()" class="w-full bg-red-600 p-3 rounded-lg font-bold">تسجيل الدخول</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // يمكنك تغيير الاسم والباسورد من هنا
            if(u === "admin" && p === "123") {
                window.location.href = "lsfd.html";
            } else {
                alert("بيانات الدخول خاطئة!");
            }
        }
    </script>
</body>
</html>
